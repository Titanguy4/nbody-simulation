<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>N-Body Simulation - Interactive</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="preset-bar">
      <button class="preset-btn" data-preset="SOLAR_SYSTEM">
        Système Solaire
      </button>
      <button class="preset-btn" data-preset="BINARY_SYSTEM">
        Système Binaire
      </button>
      <button class="preset-btn" data-preset="PLANETARY_RING">
        Anneau Planétaire
      </button>
      <button class="preset-btn" data-preset="GALAXY_CLUSTER">
        Amas Galactique
      </button>
      <button class="preset-btn" data-preset="GALAXY_COLLISION">
        Collision de Galaxies
      </button>
      <button class="preset-btn" data-preset="SUPER_NOVA">Supernova</button>
      <button
        id="btn-clear"
        class="preset-btn btn-clear"
        title="Détruire l'Univers"
      >
        <i data-lucide="bomb" class="icon"></i>
      </button>
    </div>

    <button id="btn-toggle-sim" class="icon-btn" title="Mettre en Pause">
      <i data-lucide="pause" class="icon"></i>
    </button>

    <details id="create-panel" open>
      <summary><i data-lucide="sparkles" class="icon"></i> Créer un Astre</summary>
      <div class="form-group">
        <select id="input-type">
          <option value="PLANET">Planète</option>
          <option value="STAR">Étoile</option>
          <option value="ASTEROID">Astéroïde</option>
        </select>
      </div>
      <div class="form-group">
        <label>Masse (kg)</label>
        <input type="number" id="input-mass" value="5.972e24" />
      </div>
      <div class="instruction">
        <i data-lucide="mouse-pointer-click" class="icon"></i> Cliquez pour
        ajouter, maintenez et étirez pour lancer
      </div>
    </details>

    <div id="info-bar">
      <span id="status" class="disconnected">
        <i data-lucide="wifi-off" class="icon"></i> Déconnecté
      </span>
      <span id="info">En attente...</span>
    </div>

    <canvas id="space"></canvas>

    <div id="body-tooltip" class="hidden"></div>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
